name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel older in-progress runs on the same branch when new commits are pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format, types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install project + dev dependencies
        run: uv sync --all-extras

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy src/

  generated:
    name: Verify generated code is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install project + dev dependencies
        run: uv sync --all-extras

      - name: Regenerate and diff
        run: |
          uv run python scripts/regen_variables.py
          if ! git diff --exit-code src/openmeteo/_generated/; then
              echo ""
              echo "::error::Generated files are out of date. Run 'just regen-variables' locally and commit the result."
              exit 1
          fi
          echo "Generated files are up to date."

  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install project + docs dependencies
        run: uv sync --all-extras

      - name: Build Sphinx docs
        run: uv run --extra docs sphinx-build -b html -W --keep-going docs docs/_build/html

  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    # Required for Codecov tokenless OIDC upload (public repos).
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install project + dev dependencies
        # --python overrides .python-version for this invocation
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Run tests with coverage
        run: uv run --python ${{ matrix.python-version }} pytest --cov=openmeteo --cov-branch --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          use_oidc: true
          fail_ci_if_error: true
